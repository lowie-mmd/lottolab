<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lotto Lab · 私人分析</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
         max-width: 880px; margin: 0 auto; padding: 24px; line-height: 1.6; }
  h1 { font-size: 1.4rem; }
  .card { border: 1px solid #8884; border-radius: 10px; padding: 16px; margin: 14px 0; }
  input[type=password] { padding: 8px; width: 240px; font-size: 1rem; }
  button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
  .muted { color: #8889; font-size: 0.85rem; }
  table { border-collapse: collapse; width: 100%; margin-top: 8px; }
  th, td { border-bottom: 1px solid #8883; padding: 6px 8px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  .err { color: #d33; }
  .pos { color: #2a8; } .neg { color: #d55; }
</style>
</head>
<body>
<h1>Lotto Lab · 私人投注分析</h1>
<p class="muted">號碼經 AES-256-GCM 加密，只在你輸入密語後於本瀏覽器記憶體解密計分；
密文可公開存放，明文永不進入 repo 或任何伺服器（規格 §7）。</p>

<div class="card">
  <label>通關密語　<input id="pass" type="password" autocomplete="off" /></label>
  <button id="go">解密並分析</button>
  <div id="status" class="muted"></div>
</div>

<div id="out"></div>

<script type="module">
import { decryptJSON } from "./crypto.js";
import { scoreTicket, scorePeriod, scorePromo, theoreticalAmount } from "./engine.js";

const $ = (id) => document.getElementById(id);
const fmt = (n) => n == null ? "—" : n.toLocaleString();

async function loadJSON(path) {
  const r = await fetch(path, { cache: "no-store" });
  if (!r.ok) throw new Error(`載入 ${path} 失敗`);
  return r.json();
}

function resolveTicket(tk, recurring) {
  if (tk.numbers) return tk.numbers;
  const rec = recurring.find((r) => r.label === tk.label);
  return rec ? rec.numbers : null;
}

$("go").onclick = async () => {
  $("out").innerHTML = "";
  $("status").textContent = "解密中…";
  let bets, draws, cfg;
  try {
    const [env, drawsFile, config] = await Promise.all([
      loadJSON("./data/bets.enc"), loadJSON("./data/draws.json"), loadJSON("./data/config.json"),
    ]);
    draws = drawsFile.draws; cfg = config;
    bets = await decryptJSON(env, $("pass").value);
  } catch (e) {
    // 解密失敗只顯示「無法解密」，不洩漏任何結構資訊（§7.2）
    $("status").innerHTML = '<span class="err">無法解密</span>';
    return;
  }
  $("status").textContent = "";
  render(bets, draws, cfg);
};

function render(bets, draws, cfg) {
  const theo = cfg.theoretical_prizes;
  const byPeriod = Object.fromEntries(draws.map((d) => [String(d.period), d]));
  const recurring = bets.recurring || [];

  // 各投注 label 拆開統計（電腦選號 vs 夢境 vs 塔位，§7.3）
  const groups = {};
  const ensure = (label) => (groups[label] ||= {
    label, cost: 0, theo: 0, actual: 0, actualNA: 0, promo: 0, hits: {},
  });

  for (const bet of bets.bets || []) {
    const draw = byPeriod[String(bet.period)];
    if (!draw) continue;
    for (const tk of bet.tickets) {
      const nums = resolveTicket(tk, recurring);
      if (!nums) continue;
      const g = ensure(tk.label);
      g.cost += 50;
      const r = scorePeriod([nums], draw, theo);
      g.theo += r.payout_theoretical;
      if (r.payout_actual == null) g.actualNA += 1; else g.actual += r.payout_actual;
      for (const [t, c] of Object.entries(r.tier_hits)) g.hits[t] = (g.hits[t] || 0) + c;
      // 加碼比對：私人實際軌含加碼、理論軌不含（§7.3）
      if (draw.promo) g.promo += scorePromo(nums, draw.promo).win;
    }
  }

  const rows = Object.values(groups).map((g) => {
    const net = g.theo - g.cost;
    const actualNet = g.actual + g.promo - g.cost;
    return `<tr>
      <td>${g.label}</td>
      <td>${fmt(g.cost)}</td>
      <td class="${net>=0?'pos':'neg'}">${fmt(net)}</td>
      <td>${g.cost ? (g.theo/g.cost).toFixed(3) : "—"}</td>
      <td class="${actualNet>=0?'pos':'neg'}">${fmt(actualNet)}</td>
      <td>${fmt(g.promo)}</td>
    </tr>`;
  }).join("");

  const total = Object.values(groups).reduce((a, g) => {
    a.cost += g.cost; a.theo += g.theo; a.actual += g.actual; a.promo += g.promo; return a;
  }, { cost: 0, theo: 0, actual: 0, promo: 0 });

  $("out").innerHTML = `
    <div class="card">
      <h2 style="font-size:1.1rem">三組號碼績效拆解（§7.3）</h2>
      <table>
        <thead><tr><th>組別</th><th>成本</th><th>理論淨損益</th><th>理論ROI</th>
          <th>實際淨損益(含加碼)</th><th>加碼獎金</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="muted">尚無投注紀錄</td></tr>'}</tbody>
      </table>
      <p class="muted">理論軌不含加碼、實際軌含加碼；兩者差額即加碼活動帶來的額外期望。
      漏買期不內插（缺席）。運氣餘額 = 實際 − 理論。</p>
    </div>
    <div class="card">
      <strong>合計</strong>：成本 ${fmt(total.cost)}，理論淨 ${fmt(total.theo-total.cost)}，
      實際淨(含加碼) ${fmt(total.actual+total.promo-total.cost)}，加碼 ${fmt(total.promo)}。
      <div class="muted">運氣餘額（至今比數學期望多賺/虧）：${fmt((total.actual+total.promo)-total.theo)}</div>
    </div>`;
}
</script>
</body>
</html>
